    .watch-badge{font-size:8px;color:#C9A84C;font-weight:700}

<body>
<div id="app">
  <div class="header" id="header-el">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="display:flex;align-items:center;gap:10px">
        <img src="aow-logo.jpg" alt="AOW" style="width:52px;height:28px;object-fit:cover;border-radius:4px"/>
        <div style="font-size:7px;color:#6B7280;letter-spacing:2px">ART OF WAR · CRYPTO INTELLIGENCE</div>

          <div style="width:6px;height:6px;background:#00FF88;border-radius:50%;box-shadow:0 0 6px #00FF88"></div>

      <div style="text-align:right">
        <div id="portfolio-total" style="font-size:13px;color:#C9A84C;font-weight:700"></div>

  <div class="content" id="content"></div>

  <div class="bottom-nav">
    <button class="nav-btn active" onclick="showTab('command')" id="nav-command"><span class="nav-icon">⚔</span>command</button>
    <button class="nav-btn" onclick="showTab('portfolio')" id="nav-portfolio"><span class="nav-icon">◈</span>portfolio</button>
    <button class="nav-btn" onclick="showTab('war')" id="nav-war"><span class="nav-icon">⚡</span>war</button>

    <button class="nav-btn" onclick="showTab('legal')" id="nav-legal"><span class="nav-icon">⚖</span>legal</button>
  </div>
</div>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const CG_IDS = {
  XRP:"ripple",SOL:"solana",ETH:"ethereum",LINK:"chainlink",ADA:"cardano",
  HBAR:"hedera-hashgraph",IP:"story",RNDR:"render-token",ATOM:"cosmos",
  XLM:"stellar",AVAX:"avalanche-2",OCEAN:"ocean-protocol",
  POL:"polygon-ecosystem-token",DOT:"polkadot",DESO:"deso",
  ICP:"internet-computer",ALGO:"algorand",XDC:"xdce-crowd-sale"
};
const CG_FALLBACK = {POL:"matic-network",IP:"story-2",XDC:"xdc-network"};

const PORTFOLIO = [
  {sym:"XRP", name:"Ripple",            amt:3012.39, role:"remittance",    phase:1},
  {sym:"SOL", name:"Solana",            amt:18.16,   role:"remittance",    phase:1, staked:true},
  {sym:"ETH", name:"Ethereum",          amt:0.3449,  role:"foundation",    phase:2, staked:true},
  {sym:"LINK",name:"Chainlink",         amt:61.79,   role:"oracle",        phase:1},
  {sym:"ADA", name:"Cardano",           amt:1800.87, role:"infrastructure",phase:2, staked:true},
  {sym:"HBAR",name:"Hedera",            amt:3458.14, role:"remittance",    phase:1},
  {sym:"IP",  name:"Story",             amt:500,     role:"speculative",   phase:3},
  {sym:"RNDR",name:"Render",            amt:102.36,  role:"ai",            phase:3},
  {sym:"ATOM",name:"Cosmos",            amt:95.87,   role:"infrastructure",phase:2, staked:true},
  {sym:"XLM", name:"Stellar",           amt:810.78,  role:"remittance",    phase:1},
  {sym:"AVAX",name:"Avalanche",         amt:11.24,   role:"infrastructure",phase:2, staked:true},
  {sym:"OCEAN",name:"Ocean Protocol",   amt:884.41,  role:"ai",            phase:3},
  {sym:"POL", name:"Polygon",           amt:1050.14, role:"scaling",       phase:2, staked:true},
  {sym:"DOT", name:"Polkadot",          amt:39.07,   role:"infrastructure",phase:2, staked:true},
  {sym:"DESO",name:"DeSo",              amt:12.72,   role:"speculative",   phase:3},
  {sym:"ICP", name:"Internet Computer", amt:7.69,    role:"speculative",   phase:3},
  {sym:"ALGO",name:"Algorand",          amt:0,       role:"remittance",    phase:1},
  {sym:"XDC", name:"XDC Network",       amt:0,       role:"remittance",    phase:1},
];

const WAR = [
  {co:"Ripple",        tok:"XRP",  stable:"RLUSD", chain:"XRP Ledger",  partner:"BNY Mellon",                    score:88, live:true},
  {co:"Western Union", tok:"SOL",  stable:"USDPT", chain:"Solana",      partner:"Anchorage Digital",              score:74, live:true},
  {co:"Wirex/Noah",    tok:"ALGO", stable:"USDC",  chain:"Algorand",    partner:"Wirex + Algorand Foundation",    score:67, live:true},
  {co:"Hedera Banks",  tok:"HBAR", stable:"HBAR",  chain:"Hedera",      partner:"Shinhan + Standard Bank",        score:63, live:true},
  {co:"XDC/TradeFinex",tok:"XDC",  stable:"XUSD",  chain:"XDC Network", partner:"SBI Holdings + Deutsche Telekom",score:58, live:true},
  {co:"MoneyGram",     tok:"XLM",  stable:"USDC",  chain:"Stellar",     partner:"Circle",                         score:52, live:false, note:"Partnership ended 2023"},
];

const INTEL = [
  {date:"May 21, 2026", event:"CNBC Disruptor 50 — AI dominates; crypto infrastructure companies rising", phase:1},
  {date:"May 4, 2026",  event:"Western Union USDPT goes live on Solana", phase:1},
  {date:"Feb 2026",     event:"Ripple secures 75+ global payment licenses across 6 continents", phase:1},
  {date:"Jan 2026",     event:"NYT: HesabPay powers Afghanistan remittances on Algorand — 1M+ users", phase:1},
  {date:"Jan 2026",     event:"Brale regulated stablecoin platform expands to Algorand", phase:1},
  {date:"Dec 2025",     event:"Wirex + Algorand: zero-fee USDC payments to 7M users, 80M Visa merchants", phase:1},
  {date:"Dec 2025",     event:"tZERO expands tokenization to Stellar, XDC, and Algorand", phase:1},
  {date:"Dec 2025",     event:"OCC approves Ripple National Trust Bank — first crypto national bank", phase:1},
  {date:"Dec 2025",     event:"Hedera: $5B tokenized real estate + live bank remittance pilots (Shinhan, Standard Bank)", phase:1},
  {date:"Nov 2025",     event:"Algorand + Noah: compliant payment infrastructure US, Europe & India", phase:1},
  {date:"Nov 2025",     event:"ISO 20022 mandatory globally — XRP, ALGO, HBAR, XDC, XLM, ADA all aligned", phase:1},
  {date:"Nov 2025",     event:"Ripple raises $500M at $40B valuation from Citadel", phase:1},
  {date:"Oct 2025",     event:"Western Union announces USDPT + Solana strategic partnership", phase:1},
  {date:"Aug 2025",     event:"XDC 2.0: 3-second block finality + MiCA-compliant architecture", phase:1},
  {date:"Jul 2025",     event:"Dubai Land Department tokenizes real estate on XRP Ledger", phase:1},
];

const BTC_INFLOW = 3240, BTC_TRIGGER = 5950;
let prices = {}, market = {}, currentTab = "command";

// ── Helpers ──────────────────────────────────────────────────────────────────
const C = {gold:"#C9A84C",green:"#00FF88",blue:"#4A9EFF",red:"#FF3B3B",muted:"#6B7280",text:"#E8E8E8",purple:"#A855F7",orange:"#FF8C42"};
const WAR_COLS = [C.gold, C.blue, C.green, C.purple, C.orange, C.muted];
function fmt(n,d=2){if(n==null||isNaN(n)||!isFinite(n))return"—";return n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});}
function fngColor(v){return v<=25?"#FF3B3B":v<=45?"#FF8C42":v<=55?"#C9A84C":v<=75?"#6FCF97":"#00FF88";}
function fngLabel(v){return v<=25?"EXTREME FEAR":v<=45?"FEAR":v<=55?"NEUTRAL":v<=75?"GREED":"EXTREME GREED";}
function phaseBadge(p){const cols={1:C.gold,2:C.blue,3:C.green};const lbl={1:"PI",2:"PII",3:"PIII"};return`<span class="phase-badge" style="color:${cols[p]};border-color:${cols[p]}">${lbl[p]}</span>`;}
function glowBar(val,max,col,h=5){const pct=Math.min((val/max)*100,100);return`<div class="glow-bar-wrap" style="height:${h}px"><div class="glow-bar-fill" style="width:${pct}%;background:${col};box-shadow:0 0 6px ${col}"></div></div>`;}
function changeHtml(v){if(v==null||isNaN(v))return`<span class="change-neutral">—</span>`;return v>=0?`<span class="change-up">▲${Math.abs(v).toFixed(2)}%</span>`:`<span class="change-down">▼${Math.abs(v).toFixed(2)}%</span>`;}
function getVal(sym){const p=prices[sym];if(!p)return 0;const a=PORTFOLIO.find(x=>x.sym===sym);if(!a)return 0;const v=p.price*(a.amt||0);return(isNaN(v)||!isFinite(v))?0:v;}
function roleColor(r){return r==="remittance"?C.gold:r==="oracle"?C.blue:r==="ai"?C.purple:C.muted;}

// ── Live Clock ────────────────────────────────────────────────────────────────
setInterval(()=>{
  const el=document.getElementById("clock");
  if(el)el.textContent=new Date().toLocaleTimeString();
},1000);

// ── Ticker ────────────────────────────────────────────────────────────────────
let tickerPos=0;
function animateTicker(){
  const el=document.getElementById("ticker");
  if(!el)return;
  tickerPos-=0.5;
  if(Math.abs(tickerPos)>=el.scrollWidth/2)tickerPos=0;
  el.style.transform=`translateX(${tickerPos}px)`;
  requestAnimationFrame(animateTicker);
}
function buildTicker(){
  const items=[];
  ["XRP","SOL","XLM","ETH","ALGO","HBAR"].forEach(s=>{
    const p=prices[s];
    if(!p||!p.price||isNaN(p.price)){items.push(`${s} —`);return;}
    const dec=["XLM","DESO"].includes(s)?4:2;
    const arr=(p.change24h||0)>=0?"▲":"▼";
    items.push(`${s} $${fmt(p.price,dec)} ${arr}${Math.abs(p.change24h||0).toFixed(1)}%`);
  });
  if(market.fng)items.push(`F&G ${market.fng} · ${fngLabel(market.fng)}`);
  if(market.btcDom)items.push(`BTC DOM ${market.btcDom.toFixed(1)}%`);
  if(prices.BTC)items.push(`BTC $${fmt(prices.BTC.price)}`);
  items.push("WU USDPT LIVE ON SOLANA","PHASE I ACTIVE","RLUSD $1B+ MARKET CAP",`ETF INFLOWS $${(BTC_INFLOW/1000).toFixed(2)}B/WK`,"ISO 20022 MANDATORY · 6 CHAINS ALIGNED");
  const doubled=[...items,...items];
  const el=document.getElementById("ticker");
  if(el)el.innerHTML=doubled.map(i=>`<span class="ticker-item mono">◆ ${i}</span>`).join("");
}

// ── Header update ─────────────────────────────────────────────────────────────
function updateHeader(){
  const total=PORTFOLIO.reduce((s,a)=>{const v=getVal(a.sym);return s+v;},0);
  const tel=document.getElementById("portfolio-total");
  if(tel&&total>0)tel.textContent=`$${fmt(total)}`;
  const fbar=document.getElementById("fng-bar");
  if(fbar)fbar.style.display="flex";
  const fval=document.getElementById("fng-val");
  if(fval&&market.fng){fval.textContent=`${market.fng} ${fngLabel(market.fng)}`;fval.style.color=fngColor(market.fng);}
  const dval=document.getElementById("btc-dom-val");
  if(dval&&market.btcDom)dval.textContent=`${market.btcDom.toFixed(1)}%`;
  const lu=document.getElementById("last-update");
  if(lu)lu.textContent=`⟳ ${new Date().toLocaleTimeString()}`;
}

// ── Data Fetch ────────────────────────────────────────────────────────────────
async function fetchPrices(){
  try{
    const primary=Object.values(CG_IDS);
    const fallback=Object.values(CG_FALLBACK);
    const all=[...primary,...fallback,"bitcoin"].filter((v,i,a)=>a.indexOf(v)===i);
    const res=await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${all.join(",")}&vs_currencies=usd&include_24hr_change=true`);
    if(!res.ok)return;
    const data=await res.json();
    const isOk=p=>p!=null&&!isNaN(p)&&isFinite(p)&&p>0&&p<10000000;
    Object.entries(CG_IDS).forEach(([sym,id])=>{
      const d=data[id];
      const fb=CG_FALLBACK[sym]?data[CG_FALLBACK[sym]]:null;
      const src=(d&&isOk(d.usd))?d:(fb&&isOk(fb.usd))?fb:null;
      if(src)prices[sym]={price:src.usd,change24h:src.usd_24h_change||0};
    });
    if(data.bitcoin&&isOk(data.bitcoin.usd))prices.BTC={price:data.bitcoin.usd,change24h:data.bitcoin.usd_24h_change||0};
    buildTicker();updateHeader();if(currentTab)renderTab(currentTab);
  }catch(e){}
}

async function fetchMarket(){
  try{
    const res=await fetch("https://api.coingecko.com/api/v3/global");
    if(!res.ok)return;
    const {data}=await res.json();
    market.btcDom=data.market_cap_percentage?.btc;
    market.mcap=data.total_market_cap?.usd;
    updateHeader();if(currentTab)renderTab(currentTab);
  }catch(e){}
}

async function fetchFng(){
  try{
    const res=await fetch("https://api.alternative.me/fng/?limit=1&format=json");
    if(!res.ok)return;
    const json=await res.json();
    const d=json.data?.[0];
    if(d){market.fng=parseInt(d.value);updateHeader();if(currentTab)renderTab(currentTab);}
  }catch(e){}
}

async function fetchAll(){await Promise.all([fetchPrices(),fetchMarket(),fetchFng()]);}

// ── Tab Rendering ─────────────────────────────────────────────────────────────
function showTab(tab){
  currentTab=tab;
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  const nb=document.getElementById("nav-"+tab);
  if(nb)nb.classList.add("active");
  renderTab(tab);
}

function renderTab(tab){
  const el=document.getElementById("content");
  if(!el)return;
  if(tab==="command")el.innerHTML=renderCommand();
  else if(tab==="portfolio")el.innerHTML=renderPortfolio();
  else if(tab==="war")el.innerHTML=renderWar();
  else if(tab==="strategy")el.innerHTML=renderStrategy();
  else if(tab==="intel")el.innerHTML=renderIntel();
  else if(tab==="legal")el.innerHTML=renderLegal();
}

// ── COMMAND ───────────────────────────────────────────────────────────────────
function renderCommand(){
  const remTotal=PORTFOLIO.filter(a=>a.role==="remittance").reduce((s,a)=>s+getVal(a.sym),0);
  const stakedTotal=PORTFOLIO.filter(a=>a.staked).reduce((s,a)=>s+getVal(a.sym),0);
  const total=PORTFOLIO.reduce((s,a)=>s+getVal(a.sym),0);
  const pct=Math.round((BTC_INFLOW/BTC_TRIGGER)*100);
  const btcChange=prices.BTC?.change24h||0;
  const beating=PORTFOLIO.filter(a=>prices[a.sym]&&prices[a.sym].change24h>btcChange).length;
  const altSeason=Math.round((beating/PORTFOLIO.length)*100);

  return`
<div style="display:flex;flex-direction:column;gap:10px">
  <div style="padding:10px 14px;background:rgba(201,168,76,0.08);border:1px solid #8A6F2E;border-left:3px solid #C9A84C;border-radius:4px">
    <div style="font-size:10px;color:#C9A84C;font-style:italic;line-height:1.5">"Supreme excellence: breaking the enemy's resistance without fighting."</div>
    <div style="font-size:8px;color:#6B7280;margin-top:4px">— Sun Tzu · Let remittance infrastructure win before retail knows the war began.</div>
  </div>

  <div class="card">
    <div class="section-title">LIVE MARKET INTELLIGENCE</div>
    <div class="stat-grid">
      ${statCard("FEAR & GREED", market.fng?market.fng:"…", market.fng?fngLabel(market.fng):"loading", market.fng?fngColor(market.fng):C.muted, market.fng?glowBar(market.fng,100,fngColor(market.fng),3):"")}
      ${statCard("BTC DOMINANCE", market.btcDom?`${market.btcDom.toFixed(1)}%`:"…", market.btcDom?(market.btcDom>58?"BTC dominant":"Alt season"):"loading", market.btcDom?(market.btcDom>58?C.gold:C.green):C.muted, market.btcDom?glowBar(market.btcDom,100,market.btcDom>58?C.gold:C.green,3):"")}
      ${statCard("TOTAL MCAP", market.mcap?`$${(market.mcap/1e12).toFixed(2)}T`:"…", "Global crypto", C.blue, "")}

function statCard(label,val,sub,col,bar){
  return`<div class="card-dark">
    <div class="label">${label}</div>

// ── PORTFOLIO ─────────────────────────────────────────────────────────────────
function renderPortfolio(){
  const sorted=[...PORTFOLIO].sort((a,b)=>getVal(b.sym)-getVal(a.sym));
  const total=sorted.reduce((s,a)=>s+getVal(a.sym),0);
  const remit=sorted.filter(a=>a.role==="remittance").reduce((s,a)=>s+getVal(a.sym),0);
  const maxVal=getVal(sorted[0]?.sym)||1;

  return`
<div style="display:flex;flex-direction:column;gap:10px">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
    <div class="card-dark"><div class="label">TOTAL VALUE</div><div style="font-size:16px;color:#C9A84C;font-weight:700">$${fmt(total)}</div></div>
    <div class="card-dark"><div class="label">REMITTANCE %</div><div style="font-size:16px;color:#C9A84C;font-weight:700">${total>0?Math.round((remit/total)*100):0}%</div></div>
  </div>
  <div style="display:flex;flex-direction:column;gap:3px">
    <div style="display:grid;grid-template-columns:40px 1fr 68px 55px 44px;gap:6px;padding:4px 10px">
      <span style="font-size:8px;color:#6B7280">SYM</span><span></span>
      <span style="font-size:8px;color:#6B7280;text-align:right">VALUE</span>
      <span style="font-size:8px;color:#6B7280;text-align:right">24H</span>
      <span></span>
    </div>
    ${sorted.map(a=>{
      const p=prices[a.sym];
      const val=getVal(a.sym);
      const rc=roleColor(a.role);
      return`<div class="portfolio-row">
        <span style="color:${rc};font-weight:700;font-size:11px">${a.sym}</span>
        <div>${glowBar(val,maxVal,rc)}</div>
        <span style="font-size:10px;color:#E8E8E8;text-align:right">$${fmt(val)}</span>
        <div style="text-align:right">${p?changeHtml(p.change24h):"<span class='change-neutral'>—</span>"}</div>
        <div style="display:flex;flex-direction:column;gap:2px;align-items:flex-end">
          ${phaseBadge(a.phase)}

        </div>
      </div>`;
    }).join("")}
  </div>
</div>`;
}
